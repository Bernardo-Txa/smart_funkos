name: Atualizar produtos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  atualizar-produtos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar produtos.json
        run: python scripts/gerar_produtos_json.py

      - name: Commitar alteracoes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza produtos.json"
          file_pattern: produtos.json
